
<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Xero to PandaDoc Helper</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; width: 360px; color: #111827; }
    .wrap { padding: 16px; }
    h1 { font-size: 18px; margin: 0 0 12px; }
    .card { border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px; margin-bottom: 12px; }
    .label { font-size: 12px; color: #6b7280; margin-bottom: 2px; }
    .value { font-size: 14px; word-break: break-word; }
    .empty { color: #6b7280; }
    .actions { display: flex; gap: 10px; margin-top: 12px; }
    button { padding: 9px 12px; border: 1px solid #d1d5db; border-radius: 8px; background: white; cursor: pointer; }
    button.primary { background: #111827; color: white; border-color: #111827; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Last saved Xero details</h1>
    <div id="content"></div>
    <div class="actions">
      <button id="copyBtn" type="button">Copy JSON</button>
      <button id="optionsBtn" class="primary" type="button">Open options</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
